<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #171717;
    --surface2: #1f1f1f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f0;
    --muted: #888;
    --green: #1D9E75;
    --green-light: #e1f5ee;
    --red: #E24B4A;
    --amber: #EF9F27;
    --blue: #378ADD;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  header {
    padding: 20px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .logo { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--green); }
  .header-right { display: flex; align-items: center; gap: 16px; }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  #status-dot.live { background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #last-update { font-size: 11px; color: var(--muted); font-family: var(--mono); }

  nav {
    padding: 0 32px;
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
  }
  .nav-btn {
    padding: 14px 20px;
    font-size: 13px;
    font-family: var(--font);
    font-weight: 400;
    color: var(--muted);
    background: none;
    border: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s;
  }
  .nav-btn:hover { color: var(--text); }
  .nav-btn.active { color: var(--text); border-bottom-color: var(--green); font-weight: 500; }

  main { padding: 32px; max-width: 1200px; }

  .page { display: none; }
  .page.active { display: block; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 200px; color: var(--muted); font-size: 13px; gap: 10px;
  }
  .spinner {
    width: 16px; height: 16px; border: 2px solid var(--border2);
    border-top-color: var(--green); border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Alertas */
  .alerts { margin-bottom: 24px; display: flex; flex-direction: column; gap: 8px; }
  .alert-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 8px; font-size: 13px;
  }
  .alert-bar.danger { background: rgba(226,75,74,0.12); color: #f08080; border: 1px solid rgba(226,75,74,0.2); }
  .alert-bar.success { background: rgba(29,158,117,0.12); color: #5dcaa5; border: 1px solid rgba(29,158,117,0.2); }
  .alert-bar.warn { background: rgba(239,159,39,0.12); color: #efb87c; border: 1px solid rgba(239,159,39,0.2); }
  .alert-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  /* Cards de métricas */
  .metrics { display: grid; gap: 12px; margin-bottom: 24px; }
  .metrics-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
  .metrics-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
  .metric-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 18px;
  }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .metric-value { font-size: 22px; font-weight: 500; color: var(--text); }
  .metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
  .metric-value.danger { color: var(--red); }
  .metric-value.success { color: var(--green); }

  /* Semanas */
  .week-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .week-btn {
    padding: 5px 12px; border-radius: 6px; font-size: 12px; font-family: var(--mono);
    border: 1px solid var(--border2); background: none; color: var(--muted); cursor: pointer;
    transition: all 0.15s;
  }
  .week-btn:hover { color: var(--text); border-color: var(--border2); }
  .week-btn.active { background: var(--green); color: #fff; border-color: var(--green); }

  /* Grid 2 colunas */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }

  /* Card de conteúdo */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 16px; }

  /* Funil de barras */
  .funnel-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .funnel-lbl { font-size: 12px; color: var(--muted); min-width: 100px; }
  .funnel-track { flex: 1; height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .funnel-fill { height: 100%; border-radius: 3px; background: var(--green); transition: width 0.4s ease; }
  .funnel-val { font-size: 12px; font-family: var(--mono); color: var(--text); min-width: 40px; text-align: right; }
  .funnel-pct { font-size: 11px; color: var(--muted); min-width: 32px; text-align: right; }

  /* Etiquetas */
  .etiq-item { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .etiq-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .etiq-lbl { font-size: 12px; color: var(--muted); min-width: 120px; }
  .etiq-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .etiq-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .etiq-pct { font-size: 11px; font-family: var(--mono); color: var(--muted); min-width: 36px; text-align: right; }
  .etiq-n { font-size: 11px; font-family: var(--mono); color: var(--muted); min-width: 24px; text-align: right; }

  /* Tabela semanal */
  .week-table { width: 100%; border-collapse: collapse; font-size: 12px; overflow-x: auto; display: block; }
  .week-table th {
    text-align: right; color: var(--muted); padding: 6px 10px; font-weight: 400;
    font-family: var(--mono); font-size: 11px; border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  .week-table th:first-child { text-align: left; }
  .week-table td {
    text-align: right; padding: 6px 10px; color: var(--text); font-family: var(--mono); font-size: 12px;
    border-bottom: 1px solid var(--border); white-space: nowrap;
  }
  .week-table td:first-child { text-align: left; color: var(--muted); font-family: var(--font); font-size: 12px; }
  .week-table tr:last-child td { border-bottom: none; }
  .val-danger { color: var(--red); }
  .val-warn { color: var(--amber); }
  .val-ok { color: var(--green); }

  /* Seção label */
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 12px; }

  hr.divider { border: none; border-top: 1px solid var(--border); margin: 24px 0; }

  @media (max-width: 768px) {
    main { padding: 16px; }
    .metrics-4, .metrics-3 { grid-template-columns: repeat(2, 1fr); }
    .grid2 { grid-template-columns: 1fr; }
    nav { overflow-x: auto; }
  }
</style>
</head>
<body>

<header>
  <span class="logo">Acelerador Médico — Dashboard</span>
  <div class="header-right">
    <span id="last-update">—</span>
    <div id="status-dot"></div>
  </div>
</header>

<nav>
  <button class="nav-btn active" onclick="showPage('geral', this)">Visão geral</button>
  <button class="nav-btn" onclick="showPage('sessao', this)">Sessão estratégica</button>
  <button class="nav-btn" onclick="showPage('meteorico', this)">Meteórico</button>
  <button class="nav-btn" onclick="showPage('social', this)">Social selling</button>
</nav>

<main>

<!-- VISÃO GERAL -->
<div id="page-geral" class="page active">
  <div id="geral-content" class="loading"><div class="spinner"></div> Carregando dados...</div>
</div>

<!-- SESSÃO ESTRATÉGICA -->
<div id="page-sessao" class="page">
  <div id="sessao-content" class="loading"><div class="spinner"></div> Carregando dados...</div>
</div>

<!-- METEÓRICO -->
<div id="page-meteorico" class="page">
  <div id="meteorico-content" class="loading"><div class="spinner"></div> Carregando dados...</div>
</div>

<!-- SOCIAL SELLING -->
<div id="page-social" class="page">
  <div id="social-content"></div>
</div>

</main>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
// Substitua pela URL do seu Cloudflare Worker após o deploy
const WORKER_URL = 'https://am-dashboard-worker.SEU_USUARIO.workers.dev';

const LABEL_META = {
  113: { label: 'Sem Resposta',   color: '#888780' },
  114: { label: 'Agendando',      color: '#378ADD' },
  115: { label: 'Contato Futuro', color: '#EF9F27' },
  95:  { label: 'Confirmado',     color: '#1D9E75' },
  96:  { label: 'Não Confirmou',  color: '#E24B4A' },
  97:  { label: 'Remarcou',       color: '#BA7517' },
  98:  { label: 'Cancelou',       color: '#D85A30' },
  103: { label: 'Excluído',       color: '#534AB7' },
  104: { label: 'No Show',        color: '#993556' },
  105: { label: 'Call Realizada', color: '#0F6E56' },
};

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  sessao: null,
  meteorico: null,
  currentWeek: null,
};

// ─── UTILS ────────────────────────────────────────────────────────────────────
const fmt = (n) => 'R$ ' + Math.round(n).toLocaleString('pt-BR');
const fmtK = (n) => n >= 1000000 ? 'R$ ' + (n/1000000).toFixed(1) + 'M' : n >= 1000 ? 'R$ ' + Math.round(n/1000) + 'k' : fmt(n);
const pct = (a, b) => b > 0 ? Math.round(a/b*100) + '%' : '—';

function weekLabel(iso) {
  const d = new Date(iso + 'T00:00:00');
  const sun = new Date(d); sun.setDate(d.getDate() + 6);
  const fmt = (x) => x.getDate().toString().padStart(2,'0') + '/' + (x.getMonth()+1).toString().padStart(2,'0');
  return fmt(d) + '–' + fmt(sun);
}

// ─── FETCH ────────────────────────────────────────────────────────────────────
async function fetchData(path) {
  const res = await fetch(WORKER_URL + path);
  if (!res.ok) throw new Error('Erro ' + res.status);
  return res.json();
}

// ─── RENDER GERAL ─────────────────────────────────────────────────────────────
function renderGeral() {
  const { sessao, meteorico } = state;
  const totalFat = sessao ? sessao.totalFat : 0;
  const totalVendas = sessao ? sessao.totalVendas : 0;
  const lastWeek = sessao && sessao.weeks.length > 0 ? sessao.weeks[sessao.weeks.length - 1] : null;

  document.getElementById('geral-content').innerHTML = `
    <div class="alerts">
      <div class="alert-bar success">
        <div class="alert-dot" style="background:var(--green)"></div>
        Sessão estratégica: canal principal ativo — ${totalVendas} vendas registradas
      </div>
      <div class="alert-bar warn">
        <div class="alert-dot" style="background:var(--amber)"></div>
        Meteórico: investimento em andamento — evento em Set/26
      </div>
      <div class="alert-bar danger">
        <div class="alert-dot" style="background:var(--red)"></div>
        Social selling: sem faturamento atribuído — revisar atribuição no Pipe
      </div>
    </div>

    <div class="section-label" style="margin-top:28px">Consolidado YTD</div>
    <div class="metrics metrics-4" style="margin-bottom:32px">
      <div class="metric-card">
        <div class="metric-label">Faturamento</div>
        <div class="metric-value">${fmtK(totalFat)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Vendas</div>
        <div class="metric-value">${totalVendas}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Leads totais</div>
        <div class="metric-value">${sessao ? sessao.totalLeads : '—'}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Conv. geral</div>
        <div class="metric-value">${pct(totalVendas, sessao?.totalLeads || 0)}</div>
      </div>
    </div>

    ${lastWeek ? `
      <div class="section-label">Semana atual — Sessão Estratégica (${weekLabel(lastWeek.weekStart)})</div>
      <div class="metrics metrics-4" style="margin-bottom:20px">
        <div class="metric-card">
          <div class="metric-label">Deals</div>
          <div class="metric-value">${lastWeek.deals.length}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Agendadas</div>
          <div class="metric-value">${lastWeek.agendadas}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Realizadas</div>
          <div class="metric-value">${lastWeek.realizadas}</div>
          <div class="metric-sub">show up ${pct(lastWeek.realizadas, lastWeek.agendadas)}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Vendas</div>
          <div class="metric-value ${lastWeek.vendas > 0 ? 'success' : ''}">${lastWeek.vendas}</div>
          <div class="metric-sub">${fmtK(lastWeek.faturamento)}</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Etiquetas — semana atual</div>
        ${renderEtiquetasSmall(lastWeek.labels, Object.values(lastWeek.labels).reduce((a,b)=>a+b,0))}
      </div>
    ` : ''}
  `;
}

function renderWeekSummaryCard(wk) {
  const total = Object.values(wk.labels).reduce((a,b) => a+b, 0);
  return `
    <div class="card">
      <div class="card-title">${weekLabel(wk.weekStart)}</div>
      <div class="metrics metrics-4" style="margin-bottom:16px">
        <div class="metric-card">
          <div class="metric-label">Deals</div>
          <div class="metric-value">${wk.deals.length}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Agendadas</div>
          <div class="metric-value">${wk.agendadas}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Realizadas</div>
          <div class="metric-value">${wk.realizadas}</div>
          <div class="metric-sub">show up ${pct(wk.realizadas, wk.agendadas)}</div>
        </div>
        <div class="metric-card">
          <div class="metric-label">Vendas</div>
          <div class="metric-value ${wk.vendas > 0 ? 'success' : ''}">${wk.vendas}</div>
          <div class="metric-sub">${fmtK(wk.faturamento)}</div>
        </div>
      </div>
      ${renderEtiquetasSmall(wk.labels, total)}
    </div>
  `;
}

function renderEtiquetasSmall(labels, total) {
  return Object.entries(LABEL_META).map(([id, meta]) => {
    const n = labels[id] || 0;
    const p = total > 0 ? Math.round(n/total*100) : 0;
    return `<div class="etiq-item">
      <div class="etiq-dot" style="background:${meta.color}"></div>
      <span class="etiq-lbl">${meta.label}</span>
      <div class="etiq-track"><div class="etiq-fill" style="width:${p}%;background:${meta.color}"></div></div>
      <span class="etiq-pct">${p}%</span>
      <span class="etiq-n">${n}</span>
    </div>`;
  }).join('');
}

// ─── RENDER SESSÃO ────────────────────────────────────────────────────────────
function renderSessao() {
  const { sessao } = state;
  if (!sessao || !sessao.weeks.length) {
    document.getElementById('sessao-content').innerHTML = '<div class="loading">Sem dados disponíveis</div>';
    return;
  }

  const weeks = sessao.weeks;
  const currentWk = state.currentWeek || weeks[weeks.length - 1].weekStart;

  const weekBtns = weeks.map(w => `
    <button class="week-btn ${w.weekStart === currentWk ? 'active' : ''}"
      onclick="selectWeek('${w.weekStart}')">${weekLabel(w.weekStart)}</button>
  `).join('');

  const wk = weeks.find(w => w.weekStart === currentWk) || weeks[weeks.length - 1];
  const total = Object.values(wk.labels).reduce((a,b) => a+b, 0);

  // Comparativo todas as semanas
  const tableRows = [
    ['Deals', weeks.map(w => w.deals.length)],
    ['Agendadas', weeks.map(w => w.agendadas)],
    ['Realizadas', weeks.map(w => w.realizadas)],
    ['Show up', weeks.map(w => pct(w.realizadas, w.agendadas))],
    ['No show', weeks.map(w => w.noshow)],
    ['Vendas', weeks.map(w => w.vendas)],
    ['Faturamento', weeks.map(w => fmtK(w.faturamento))],
    ['Cash collect', weeks.map(w => fmtK(w.cashCollect))],
  ];

  const tableHtml = `
    <div class="card" style="overflow-x:auto; margin-top:20px;">
      <div class="card-title">Comparativo semanal</div>
      <table class="week-table">
        <thead>
          <tr>
            <th>Métrica</th>
            ${weeks.map(w => `<th>${weekLabel(w.weekStart)}</th>`).join('')}
          </tr>
        </thead>
        <tbody>
          ${tableRows.map(([label, vals]) => `
            <tr>
              <td>${label}</td>
              ${vals.map(v => `<td>${v}</td>`).join('')}
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  document.getElementById('sessao-content').innerHTML = `
    <div class="section-label" style="margin-bottom:12px">Selecione a semana</div>
    <div class="week-nav">${weekBtns}</div>

    <div class="metrics metrics-4" style="margin-bottom:20px">
      <div class="metric-card">
        <div class="metric-label">Deals na semana</div>
        <div class="metric-value">${wk.deals.length}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Calls agendadas</div>
        <div class="metric-value">${wk.agendadas}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Calls realizadas</div>
        <div class="metric-value">${wk.realizadas}</div>
        <div class="metric-sub">show up ${pct(wk.realizadas, wk.agendadas)}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Vendas</div>
        <div class="metric-value ${wk.vendas > 0 ? 'success' : ''}">${wk.vendas}</div>
        <div class="metric-sub">${fmtK(wk.faturamento)}</div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="card-title">Funil da semana</div>
        ${renderFunilBars(wk)}
      </div>
      <div class="card">
        <div class="card-title">Etiquetas — proporção</div>
        ${renderEtiquetasSmall(wk.labels, total)}
        <div style="margin-top:10px; font-size:11px; color:var(--muted)">Total: ${total} deals com etiqueta</div>
      </div>
    </div>

    ${tableHtml}
  `;
}

function renderFunilBars(wk) {
  const items = [
    { label: 'Deals', val: wk.deals.length, max: wk.deals.length },
    { label: 'Agendadas', val: wk.agendadas, max: wk.deals.length },
    { label: 'Realizadas', val: wk.realizadas, max: wk.deals.length },
    { label: 'No show', val: wk.noshow, max: wk.deals.length },
    { label: 'Vendas', val: wk.vendas, max: wk.deals.length },
  ];
  return items.map(item => {
    const p = item.max > 0 ? Math.round(item.val/item.max*100) : 0;
    return `<div class="funnel-item">
      <span class="funnel-lbl">${item.label}</span>
      <div class="funnel-track"><div class="funnel-fill" style="width:${p}%"></div></div>
      <span class="funnel-val">${item.val}</span>
      <span class="funnel-pct">${p}%</span>
    </div>`;
  }).join('');
}

function selectWeek(iso) {
  state.currentWeek = iso;
  renderSessao();
}

// ─── RENDER METEÓRICO ─────────────────────────────────────────────────────────
function renderMeteórico() {
  const m = state.meteorico;
  document.getElementById('meteorico-content').innerHTML = `
    <div class="alerts" style="margin-bottom:20px">
      <div class="alert-bar warn">
        <div class="alert-dot" style="background:var(--amber)"></div>
        Funil de grupo — métricas de call não se aplicam aqui. CAC teto: ~50% do ticket ativo.
      </div>
    </div>

    <div class="section-label">Evolution Set/26 — dados do pipeline Evento</div>
    <div class="metrics metrics-3" style="margin-bottom:24px">
      <div class="metric-card">
        <div class="metric-label">Total de deals</div>
        <div class="metric-value">${m ? m.totalDeals : '—'}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Ingressos vendidos</div>
        <div class="metric-value ${m && m.vendas > 0 ? 'success' : ''}">${m ? m.vendas : '—'}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Faturamento</div>
        <div class="metric-value">${m ? fmtK(m.faturamento) : '—'}</div>
      </div>
    </div>

    <div class="section-label">Funil específico do Meteórico</div>
    <div class="card">
      ${['Entrada no grupo','Aquecimento','Carrinho aberto','Conversão'].map(l => `
        <div class="funnel-item">
          <span class="funnel-lbl">${l}</span>
          <div class="funnel-track"><div class="funnel-fill" style="width:0%"></div></div>
          <span class="funnel-val" style="color:var(--muted)">—</span>
        </div>
      `).join('')}
      <div style="margin-top:14px; font-size:12px; color:var(--muted)">
        Métricas de grupo serão populadas conforme a estratégia avança. Métrica principal: custo por grupo (CPG).
      </div>
    </div>
  `;
}

// ─── RENDER SOCIAL ────────────────────────────────────────────────────────────
function renderSocial() {
  document.getElementById('social-content').innerHTML = `
    <div class="alerts" style="margin-bottom:20px">
      <div class="alert-bar danger">
        <div class="alert-dot" style="background:var(--red)"></div>
        Faturamento atribuído: R$ 0 — verificar atribuição no Pipedrive
      </div>
    </div>

    <div class="section-label">Pontos de investigação</div>
    <div class="card">
      ${[
        'Campanhas ativas ou pausadas? Confirmar status no Meta Ads.',
        'Leads chegando? Se sim, identificar onde está a quebra no funil.',
        'Atribuição correta? Vendas podem estar lançadas como "Outros" no Pipe.',
        'Qual era a meta de faturamento esperada para o investimento realizado?',
      ].map((txt, i) => `
        <div style="display:flex;gap:12px;margin-bottom:12px;font-size:13px;align-items:flex-start">
          <span style="color:var(--muted);font-family:var(--mono);font-size:11px;margin-top:2px">${i+1}.</span>
          <span style="color:var(--text)">${txt}</span>
        </div>
      `).join('')}
    </div>

    <div class="section-label" style="margin-top:20px">Estrutura de etiquetas — aguardando dados</div>
    <div class="card">
      ${Object.entries(LABEL_META).map(([id, meta]) => `
        <div class="etiq-item">
          <div class="etiq-dot" style="background:${meta.color}"></div>
          <span class="etiq-lbl">${meta.label}</span>
          <div class="etiq-track"><div class="etiq-fill" style="width:0%;background:${meta.color}"></div></div>
          <span class="etiq-pct" style="color:var(--muted)">—</span>
        </div>
      `).join('')}
      <div style="margin-top:12px;font-size:12px;color:var(--muted)">
        Dados serão populados quando o pipeline Social Selling for criado no Pipedrive.
      </div>
    </div>
  `;
}

// ─── NAV ──────────────────────────────────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
  const dot = document.getElementById('status-dot');
  const upd = document.getElementById('last-update');

  try {
    const [sessao, meteorico] = await Promise.all([
      fetchData('/api/sessao-estrategica'),
      fetchData('/api/meteorico'),
    ]);

    state.sessao = sessao;
    state.meteorico = meteorico;

    dot.classList.add('live');
    upd.textContent = 'atualizado ' + new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

    renderGeral();
    renderSessao();
    renderMeteórico();
    renderSocial();

  } catch (e) {
    dot.style.background = 'var(--red)';
    upd.textContent = 'erro ao carregar';
    document.getElementById('geral-content').innerHTML = `
      <div class="alert-bar danger" style="margin-top:20px">
        <div class="alert-dot" style="background:var(--red)"></div>
        Não foi possível conectar ao Worker. Verifique se WORKER_URL está configurado corretamente e se a API key está ativa.
      </div>
      <div style="margin-top:12px; font-size:12px; color:var(--muted); font-family:var(--mono)">Erro: ${e.message}</div>
    `;
  }
}

init();
</script>
</body>
</html>
