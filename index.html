<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AM Dashboard — Marketing</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', sans-serif; background: #0d0d0d; color: #fff; min-height: 100vh; }

  header {
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0a0a0a;
    border-bottom: 1px solid #1a1a1a;
  }

  nav {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .nav-btn {
    padding: 8px 20px;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    color: #666;
    background: transparent;
    border: none;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.15s;
  }
  .nav-btn:hover { color: #fff; background: #1a1a1a; }
  .nav-btn.active { color: #0d0d0d; background: #F5A623; }

  .header-right { display: flex; align-items: center; gap: 12px; }
  #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
  #status-dot.live { background: #22c55e; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  #last-update { font-size: 11px; color: #444; font-weight: 500; }

  main { padding: 28px 32px; max-width: 1400px; }

  .page { display: none; }
  .page.active { display: block; }

  .loading {
    display: flex; align-items: center; justify-content: center;
    height: 300px; color: #444; font-size: 13px; gap: 10px;
  }
  .spinner {
    width: 18px; height: 18px; border: 2px solid #222;
    border-top-color: #F5A623; border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Big metric cards — estilo CS */
  .big-cards { display: grid; gap: 12px; margin-bottom: 28px; }
  .big-cards-4 { grid-template-columns: repeat(4, minmax(0,1fr)); }
  .big-cards-3 { grid-template-columns: repeat(3, minmax(0,1fr)); }
  .big-cards-5 { grid-template-columns: repeat(5, minmax(0,1fr)); }

  .big-card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-top: 3px solid #222;
    border-radius: 10px;
    padding: 20px 22px 18px;
    position: relative;
  }
  .big-card.yellow { border-top-color: #F5A623; }
  .big-card.green  { border-top-color: #22c55e; }
  .big-card.red    { border-top-color: #ef4444; }
  .big-card.blue   { border-top-color: #3b82f6; }
  .big-card.purple { border-top-color: #a855f7; }
  .big-card.amber  { border-top-color: #f59e0b; }

  .big-card-value {
    font-size: 36px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 8px;
  }
  .big-card.yellow .big-card-value { color: #F5A623; }
  .big-card.green  .big-card-value { color: #22c55e; }
  .big-card.red    .big-card-value { color: #ef4444; }
  .big-card.blue   .big-card-value { color: #3b82f6; }
  .big-card.purple .big-card-value { color: #a855f7; }
  .big-card.amber  .big-card-value { color: #f59e0b; }

  .big-card-label { font-size: 12px; color: #555; font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
  .big-card-sub { font-size: 11px; color: #444; margin-top: 4px; }

  /* Alertas */
  .alerts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
  .alert-bar {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500;
  }
  .alert-bar.danger { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
  .alert-bar.success { background: rgba(34,197,94,0.1); color: #86efac; border: 1px solid rgba(34,197,94,0.2); }
  .alert-bar.warn { background: rgba(245,166,35,0.1); color: #fcd34d; border: 1px solid rgba(245,166,35,0.2); }
  .alert-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* Semana selector */
  .week-nav { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; }
  .week-btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px; font-weight: 600;
    border: 1px solid #222; background: #111; color: #555; cursor: pointer;
    transition: all 0.15s; font-family: 'Inter', sans-serif;
  }
  .week-btn:hover { color: #fff; border-color: #333; }
  .week-btn.active { background: #F5A623; color: #0d0d0d; border-color: #F5A623; }

  /* Card padrão */
  .card {
    background: #111;
    border: 1px solid #1e1e1e;
    border-radius: 10px;
    padding: 20px 22px;
  }
  .card-title {
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
    color: #444; margin-bottom: 16px; font-weight: 600;
  }

  /* Grid */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  .grid3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 20px; }

  /* Funil barras */
  .funnel-item { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .funnel-lbl { font-size: 12px; color: #555; min-width: 110px; font-weight: 500; }
  .funnel-track { flex: 1; height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
  .funnel-fill { height: 100%; border-radius: 3px; background: #F5A623; transition: width 0.5s ease; }
  .funnel-val { font-size: 13px; font-weight: 700; color: #fff; min-width: 40px; text-align: right; }
  .funnel-pct { font-size: 11px; color: #444; min-width: 36px; text-align: right; }

  /* Etiquetas */
  .etiq-item { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }
  .etiq-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .etiq-lbl { font-size: 12px; color: #555; min-width: 120px; font-weight: 500; }
  .etiq-track { flex: 1; height: 5px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
  .etiq-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .etiq-pct { font-size: 12px; font-weight: 700; color: #fff; min-width: 38px; text-align: right; }
  .etiq-n { font-size: 11px; color: #444; min-width: 24px; text-align: right; }

  /* Tabela */
  .tbl-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    text-align: right; color: #444; padding: 8px 12px; font-weight: 600;
    font-size: 11px; border-bottom: 1px solid #1e1e1e; text-transform: uppercase;
    letter-spacing: 0.05em; white-space: nowrap;
  }
  thead th:first-child { text-align: left; }
  tbody td {
    text-align: right; padding: 9px 12px; color: #ccc; font-weight: 500;
    border-bottom: 1px solid #161616; white-space: nowrap;
  }
  tbody td:first-child { text-align: left; color: #666; font-weight: 600; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover td { background: #161616; }
  .val-danger { color: #ef4444 !important; }
  .val-warn { color: #f59e0b !important; }
  .val-ok { color: #22c55e !important; }
  .val-yellow { color: #F5A623 !important; }

  hr.divider { border: none; border-top: 1px solid #1a1a1a; margin: 24px 0; }
  .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #444; margin-bottom: 14px; font-weight: 600; }

  @media (max-width: 900px) {
    main { padding: 16px; }
    .big-cards-4, .big-cards-5 { grid-template-columns: repeat(2,1fr); }
    .grid2, .grid3 { grid-template-columns: 1fr; }
  }
</style>
</head>

<script>
const WORKER_URL = 'https://sweet-frost-b4a9.aceleradormedico2021.workers.dev';

const LABEL_META = {
  113: { label: 'Sem Resposta',   color: '#6b7280' },
  114: { label: 'Agendando',      color: '#3b82f6' },
  115: { label: 'Contato Futuro', color: '#f59e0b' },
  95:  { label: 'Confirmado',     color: '#22c55e' },
  96:  { label: 'Não Confirmou',  color: '#ef4444' },
  97:  { label: 'Remarcou',       color: '#eab308' },
  98:  { label: 'Cancelou',       color: '#f97316' },
  103: { label: 'Excluído',       color: '#8b5cf6' },
  104: { label: 'No Show',        color: '#ec4899' },
  105: { label: 'Call Realizada', color: '#10b981' },
};

let state = { sessao: null, meteorico: null, currentWeek: null };

const fmt = (n) => 'R$ ' + Math.round(n).toLocaleString('pt-BR');
const fmtK = (n) => n >= 1000000 ? 'R$ ' + (n/1000000).toFixed(1).replace('.',',') + 'M' : n >= 1000 ? 'R$ ' + Math.round(n/1000) + 'k' : fmt(n);
const pct = (a,b) => b > 0 ? Math.round(a/b*100) + '%' : '—';

function weekLabel(iso) {
  const d = new Date(iso + 'T00:00:00');
  const sun = new Date(d); sun.setDate(d.getDate()+6);
  const f = x => x.getDate().toString().padStart(2,'0')+'/'+( x.getMonth()+1).toString().padStart(2,'0');
  return f(d)+'–'+f(sun);
}

async function fetchData(path) {
  const res = await fetch(WORKER_URL + path);
  if (!res.ok) throw new Error('Erro '+res.status);
  return res.json();
}

function renderEtiquetas(labels) {
  const total = Object.values(labels).reduce((a,b)=>a+b,0);
  return Object.entries(LABEL_META).map(([id,meta]) => {
    const n = labels[id]||0;
    const p = total>0 ? Math.round(n/total*100) : 0;
    return `<div class="etiq-item">
      <div class="etiq-dot" style="background:${meta.color}"></div>
      <span class="etiq-lbl">${meta.label}</span>
      <div class="etiq-track"><div class="etiq-fill" style="width:${p}%;background:${meta.color}"></div></div>
      <span class="etiq-pct">${p}%</span>
      <span class="etiq-n">${n}</span>
    </div>`;
  }).join('');
}

function renderGeral() {
  const s = state.sessao;
  const totalFat = s ? s.totalFat : 0;
  const totalVendas = s ? s.totalVendas : 0;
  const totalLeads = s ? s.totalLeads : 0;
  const lastWeek = s && s.weeks.length > 0 ? s.weeks[s.weeks.length-1] : null;
  const m = state.meteorico;

  document.getElementById('geral-content').innerHTML = `
    <div class="alerts">
      <div class="alert-bar success"><div class="alert-dot" style="background:#22c55e"></div>Sessão estratégica: ${totalVendas} vendas — canal principal ativo</div>
      <div class="alert-bar warn"><div class="alert-dot" style="background:#F5A623"></div>Meteórico: ${m ? m.vendas : '—'} ingressos vendidos — evento em Set/26</div>
      <div class="alert-bar danger"><div class="alert-dot" style="background:#ef4444"></div>Social selling: sem faturamento atribuído — revisar atribuição no Pipe</div>
    </div>

    <div class="section-label">Consolidado YTD</div>
    <div class="big-cards big-cards-4" style="margin-bottom:32px">
      <div class="big-card yellow">
        <div class="big-card-value">${fmtK(totalFat)}</div>
        <div class="big-card-label">Faturamento</div>
      </div>
      <div class="big-card green">
        <div class="big-card-value">${totalVendas}</div>
        <div class="big-card-label">Vendas fechadas</div>
      </div>
      <div class="big-card blue">
        <div class="big-card-value">${totalLeads}</div>
        <div class="big-card-label">Leads totais</div>
      </div>
      <div class="big-card purple">
        <div class="big-card-value">${pct(totalVendas, totalLeads)}</div>
        <div class="big-card-label">Conversão geral</div>
      </div>
    </div>

    ${lastWeek ? `
      <div class="section-label">Semana atual — Sessão Estratégica (${weekLabel(lastWeek.weekStart)})</div>
      <div class="big-cards big-cards-5" style="margin-bottom:24px">
        <div class="big-card yellow">
          <div class="big-card-value">${lastWeek.deals.length}</div>
          <div class="big-card-label">Deals</div>
        </div>
        <div class="big-card blue">
          <div class="big-card-value">${lastWeek.agendadas}</div>
          <div class="big-card-label">Agendadas</div>
        </div>
        <div class="big-card amber">
          <div class="big-card-value">${lastWeek.realizadas}</div>
          <div class="big-card-label">Realizadas</div>
          <div class="big-card-sub">show up ${pct(lastWeek.realizadas, lastWeek.agendadas)}</div>
        </div>
        <div class="big-card red">
          <div class="big-card-value">${lastWeek.noshow}</div>
          <div class="big-card-label">No show</div>
        </div>
        <div class="big-card green">
          <div class="big-card-value">${lastWeek.vendas}</div>
          <div class="big-card-label">Vendas</div>
          <div class="big-card-sub">${fmtK(lastWeek.faturamento)}</div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Etiquetas — semana atual</div>
        ${renderEtiquetas(lastWeek.labels)}
      </div>
    ` : ''}
  `;
}

function renderSessao() {
  const s = state.sessao;
  if (!s || !s.weeks.length) {
    document.getElementById('sessao-content').innerHTML = '<div class="loading">Sem dados</div>';
    return;
  }
  const weeks = s.weeks;
  const curIso = state.currentWeek || weeks[weeks.length-1].weekStart;
  const wk = weeks.find(w => w.weekStart === curIso) || weeks[weeks.length-1];
  const totalEtiq = Object.values(wk.labels).reduce((a,b)=>a+b,0);

  const tableRows = [
    ['Deals', weeks.map(w => w.deals.length)],
    ['Agendadas', weeks.map(w => w.agendadas)],
    ['Realizadas', weeks.map(w => w.realizadas)],
    ['Show up', weeks.map(w => pct(w.realizadas, w.agendadas))],
    ['No show', weeks.map(w => w.noshow)],
    ['Vendas', weeks.map(w => w.vendas)],
    ['Faturamento', weeks.map(w => fmtK(w.faturamento))],
    ['Cash collect', weeks.map(w => fmtK(w.cashCollect))],
  ];

  document.getElementById('sessao-content').innerHTML = `
    <div class="week-nav">
      ${weeks.map(w => `<button class="week-btn ${w.weekStart===curIso?'active':''}" onclick="selectWeek('${w.weekStart}')">${weekLabel(w.weekStart)}</button>`).join('')}
    </div>

    <div class="big-cards big-cards-5" style="margin-bottom:24px">
      <div class="big-card yellow">
        <div class="big-card-value">${wk.deals.length}</div>
        <div class="big-card-label">Deals</div>
      </div>
      <div class="big-card blue">
        <div class="big-card-value">${wk.agendadas}</div>
        <div class="big-card-label">Agendadas</div>
      </div>
      <div class="big-card amber">
        <div class="big-card-value">${wk.realizadas}</div>
        <div class="big-card-label">Realizadas</div>
        <div class="big-card-sub">show up ${pct(wk.realizadas, wk.agendadas)}</div>
      </div>
      <div class="big-card red">
        <div class="big-card-value">${wk.noshow}</div>
        <div class="big-card-label">No show</div>
      </div>
      <div class="big-card green">
        <div class="big-card-value">${wk.vendas}</div>
        <div class="big-card-label">Vendas</div>
        <div class="big-card-sub">${fmtK(wk.faturamento)}</div>
      </div>
    </div>

    <div class="grid2">
      <div class="card">
        <div class="card-title">Funil da semana</div>
        ${['Deals','Agendadas','Realizadas','No show','Vendas'].map((l,i) => {
          const vals = [wk.deals.length, wk.agendadas, wk.realizadas, wk.noshow, wk.vendas];
          const v = vals[i]; const max = wk.deals.length;
          const p = max>0 ? Math.round(v/max*100) : 0;
          return `<div class="funnel-item">
            <span class="funnel-lbl">${l}</span>
            <div class="funnel-track"><div class="funnel-fill" style="width:${p}%"></div></div>
            <span class="funnel-val">${v}</span>
            <span class="funnel-pct">${p}%</span>
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="card-title">Etiquetas — proporção</div>
        ${renderEtiquetas(wk.labels)}
        <div style="margin-top:10px;font-size:11px;color:#333">Total com etiqueta: ${totalEtiq}</div>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <div class="card-title">Comparativo semanal</div>
      <div class="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th>Métrica</th>
              ${weeks.map(w=>`<th>${weekLabel(w.weekStart)}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${tableRows.map(([label,vals])=>`
              <tr><td>${label}</td>${vals.map(v=>`<td>${v}</td>`).join('')}</tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderMeteórico() {
  const m = state.meteorico;
  document.getElementById('meteorico-content').innerHTML = `
    <div class="alerts" style="margin-bottom:24px">
      <div class="alert-bar warn"><div class="alert-dot" style="background:#F5A623"></div>Funil de grupo — CAC teto: ~50% do ticket ativo. Evento em Set/26.</div>
    </div>
    <div class="section-label">Pipeline Evento — dados atuais</div>
    <div class="big-cards big-cards-3" style="margin-bottom:28px">
      <div class="big-card yellow">
        <div class="big-card-value">${m ? m.totalDeals : '—'}</div>
        <div class="big-card-label">Total de deals</div>
      </div>
      <div class="big-card green">
        <div class="big-card-value">${m ? m.vendas : '—'}</div>
        <div class="big-card-label">Ingressos vendidos</div>
      </div>
      <div class="big-card blue">
        <div class="big-card-value">${m ? fmtK(m.faturamento) : '—'}</div>
        <div class="big-card-label">Faturamento</div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Funil Meteórico — estrutura</div>
      ${['Entrada no grupo','Aquecimento','Carrinho aberto','Conversão'].map(l=>`
        <div class="funnel-item">
          <span class="funnel-lbl">${l}</span>
          <div class="funnel-track"><div class="funnel-fill" style="width:0%"></div></div>
          <span class="funnel-val" style="color:#333">—</span>
        </div>
      `).join('')}
      <div style="margin-top:14px;font-size:12px;color:#444">Métricas de grupo populadas conforme a estratégia avança. Métrica principal: custo por grupo (CPG).</div>
    </div>
  `;
}

function renderSocial() {
  document.getElementById('social-content').innerHTML = `
    <div class="alerts" style="margin-bottom:24px">
      <div class="alert-bar danger"><div class="alert-dot" style="background:#ef4444"></div>Faturamento atribuído: R$ 0 — revisar atribuição no Pipedrive</div>
    </div>
    <div class="section-label">Pontos de investigação</div>
    <div class="card" style="margin-bottom:20px">
      ${[
        'Campanhas ativas ou pausadas? Confirmar status no Meta Ads.',
        'Leads chegando? Se sim, identificar onde está a quebra no funil.',
        'Atribuição correta? Vendas podem estar lançadas como "Outros" no Pipe.',
        'Qual era a meta de faturamento esperada para o investimento realizado?',
      ].map((txt,i)=>`
        <div style="display:flex;gap:14px;margin-bottom:14px;align-items:flex-start">
          <span style="color:#F5A623;font-weight:800;font-size:14px;line-height:1.4">${i+1}.</span>
          <span style="color:#888;font-size:13px;line-height:1.6">${txt}</span>
        </div>
      `).join('')}
    </div>
    <div class="section-label">Etiquetas — aguardando dados</div>
    <div class="card">
      ${Object.entries(LABEL_META).map(([id,meta])=>`
        <div class="etiq-item">
          <div class="etiq-dot" style="background:${meta.color}"></div>
          <span class="etiq-lbl">${meta.label}</span>
          <div class="etiq-track"><div class="etiq-fill" style="width:0%;background:${meta.color}"></div></div>
          <span class="etiq-pct" style="color:#333">—</span>
        </div>
      `).join('')}
    </div>
  `;
}

function selectWeek(iso) {
  state.currentWeek = iso;
  renderSessao();
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  btn.classList.add('active');
}

async function init() {
  const dot = document.getElementById('status-dot');
  const upd = document.getElementById('last-update');
  try {
    const [sessao, meteorico] = await Promise.all([
      fetchData('/api/sessao-estrategica'),
      fetchData('/api/meteorico'),
    ]);
    state.sessao = sessao;
    state.meteorico = meteorico;
    dot.classList.add('live');
    upd.textContent = 'atualizado ' + new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    renderGeral();
    renderSessao();
    renderMeteórico();
    renderSocial();
  } catch(e) {
    dot.style.background = '#ef4444';
    upd.textContent = 'erro ao carregar';
    document.getElementById('geral-content').innerHTML = `
      <div class="alert-bar danger" style="margin-top:20px">
        <div class="alert-dot" style="background:#ef4444"></div>
        Não foi possível conectar ao Worker. Erro: ${e.message}
      </div>`;
  }
}

init();
</script>
</body>
</html>
